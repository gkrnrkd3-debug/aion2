<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>아이온2 숙제</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c9a84c">
<meta name="application-name" content="아이온2 숙제">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  :root{--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.2);--blue:#4a9edd;--green:#4ecf7a;--red:#e05555;--bg:#0a0d14;--card:#141d2e;--card2:#1a2438;--text:#d4c5a0;--bright:#f0e8cc;--muted:#6a7a90;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(74,158,221,0.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(201,168,76,0.05) 0%,transparent 50%);}
  .sync-bar{background:rgba(10,13,20,0.9);border-bottom:1px solid rgba(255,255,255,0.04);padding:4px 20px;display:flex;align-items:center;justify-content:flex-end;gap:6px;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
  .sync-dot.online{background:var(--green);box-shadow:0 0 5px var(--green);}
  .sync-dot.syncing{background:var(--gold);box-shadow:0 0 5px var(--gold);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .sync-label{font-size:10px;color:var(--muted);}
  .header{background:rgba(15,21,32,0.97);border-bottom:1px solid var(--gold-dim);padding:0 20px;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px);}
  .header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px;position:relative;}
  .logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
  .logo:hover .logo-text{color:#f0d080;}
  .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#8a6a20,#f0d080);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:12px;}
  .logo-text{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:2px;transition:color 0.2s;}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;}
  .header-date{font-size:11px;color:var(--muted);text-align:right;line-height:1.6;}
  .header-date span{color:var(--gold);}
  /* 6. 계정탭 축소 */
  .acc-tab-bar{background:rgba(10,13,20,0.95);border-bottom:1px solid rgba(255,255,255,0.05);padding:0 10px;position:sticky;top:54px;z-index:190;}
  .acc-tab-inner{max-width:800px;margin:0 auto;display:flex;gap:2px;padding:5px 0;overflow-x:auto;}
  .acc-tab-inner::-webkit-scrollbar{display:none;}
  .acc-tab{flex:1;padding:5px 2px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;color:var(--muted);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0;}
  .acc-tab:hover{background:var(--card2);color:var(--text);}
  .acc-tab.active{background:var(--card2);color:var(--bright);border-color:var(--gold-dim);}
  .acc-tab.total-tab{flex:0 0 40px;}
  .acc-tab.total-tab.active{border-color:rgba(201,168,76,0.5);color:var(--gold);}
  .acc-prog{font-size:9px;color:var(--muted);font-weight:400;}
  .acc-tab.active .acc-prog{color:var(--gold);}
  .char-tab-bar{background:rgba(12,16,26,0.95);border-bottom:1px solid rgba(255,255,255,0.04);padding:0 20px;position:sticky;top:100px;z-index:180;}
  .char-tab-inner{max-width:800px;margin:0 auto;display:flex;gap:3px;padding:6px 0;overflow-x:auto;align-items:center;min-height:40px;}
  .char-tab-inner::-webkit-scrollbar{display:none;}
  .char-tab{flex-shrink:0;padding:5px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:6px;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .char-tab:hover{color:var(--text);background:rgba(255,255,255,0.05);}
  .char-tab.active{background:rgba(74,158,221,0.1);color:var(--blue);border-color:rgba(74,158,221,0.25);}
  .char-done{font-size:10px;opacity:0.7;}
  .add-char-btn{flex-shrink:0;padding:5px 10px;background:none;border:1px dashed rgba(255,255,255,0.12);border-radius:6px;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .add-acc-btn{flex-shrink:0;padding:5px 8px;background:none;border:1px dashed rgba(78,207,122,0.2);border-radius:7px;color:rgba(78,207,122,0.5);font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .add-acc-btn:hover{color:var(--green);border-color:rgba(78,207,122,0.5);}
  .acc-tab .del-acc{display:none;position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--red);border-radius:50%;font-size:9px;color:#fff;align-items:center;justify-content:center;line-height:1;}
  .acc-tab:hover .del-acc{display:flex;}
  .acc-tab{position:relative;}
  .add-char-btn:hover{color:var(--green);border-color:rgba(78,207,122,0.3);}
  .main{max-width:800px;margin:0 auto;padding:16px 16px 60px;}
  .top-row{display:flex;align-items:center;padding:12px 0 14px;gap:8px;flex-wrap:wrap;}
  .name-input{background:none;border:none;outline:none;font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:1px;cursor:text;border-bottom:1px dashed transparent;padding:2px 4px;transition:border-color 0.2s;}
  .name-input:focus{border-bottom-color:var(--gold-dim);}
  .char-name-input{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--blue);letter-spacing:0;}
  .top-btns{display:flex;gap:6px;margin-left:auto;}
  .sm-btn{font-size:11px;color:var(--muted);background:none;border:1px solid rgba(255,255,255,0.07);border-radius:5px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap;}
  .sm-btn:hover{color:var(--red);border-color:rgba(224,85,85,0.3);}
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 9px;}
  .section-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .dot{width:5px;height:5px;border-radius:50%;}
  .dot-blue{background:var(--blue);box-shadow:0 0 5px var(--blue);}
  .reset-btn{font-size:11px;color:var(--muted);background:none;border:1px solid rgba(255,255,255,0.07);border-radius:5px;padding:3px 10px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
  .reset-btn:hover{color:var(--red);border-color:rgba(224,85,85,0.3);}
  .task-list{display:flex;flex-direction:column;gap:3px;}
  .task-item{background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:9px;display:flex;align-items:center;gap:12px;padding:8px 14px;cursor:pointer;transition:all 0.15s ease;position:relative;user-select:none;}
  .task-item:hover{background:var(--card2);transform:translateX(2px);}
  .task-item.done{opacity:0.45;border-color:rgba(78,207,122,0.1);}
  .task-item.done::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--green);border-radius:9px 0 0 9px;}
  .check{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.2s;}
  .task-item.done .check{background:var(--green);border-color:var(--green);color:#fff;}
  .task-info{flex:1;min-width:0;}
  .task-name{font-size:13px;font-weight:500;color:var(--bright);}
  .task-item.done .task-name{text-decoration:line-through;color:var(--muted);}
  .task-desc{font-size:11px;color:var(--muted);margin-top:2px;}
  .task-count{font-size:11px;color:var(--muted);background:rgba(255,255,255,0.05);border-radius:5px;padding:2px 8px;white-space:nowrap;flex-shrink:0;}
  .weekly-sep{height:1px;background:rgba(201,168,76,0.2);margin:12px 0 4px;}
  .weekly-label{font-size:10px;color:var(--gold);letter-spacing:2px;opacity:0.7;padding:0 2px 6px;display:block;}
  /* ENERGY */
  .energy-item{cursor:default !important;overflow:visible !important;}
  .energy-item:hover{transform:none !important;}
  .energy-bar-wrap{flex:1;min-width:0;}
  .energy-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .energy-name{font-size:13px;font-weight:500;color:var(--bright);}
  .energy-desc{font-size:11px;color:var(--muted);}
  .energy-val{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;}
  .energy-track{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-bottom:4px;}
  .energy-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#4a9edd,#c9a84c);transition:width 0.3s ease;}
  .energy-slider{width:100%;display:block;margin:8px 0 4px;accent-color:var(--gold);cursor:pointer;height:20px;}
  .energy-input-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .energy-direct{background:none;border:none;border-bottom:1px solid rgba(201,168,76,0.5);color:var(--gold);font-family:inherit;font-size:15px;font-weight:700;width:60px;padding:2px 2px;outline:none;text-align:right;}
  .energy-direct:focus{border-color:var(--gold);}
  /* 토탈탭 에너지 입력창 */
  .total-energy-input{background:#0a0d14;border:1px solid rgba(201,168,76,0.5);border-radius:4px 0 0 4px;color:var(--gold);font-size:9px;font-weight:700;width:34px;text-align:center;padding:2px;outline:none;}
  .total-energy-input::-webkit-inner-spin-button,.total-energy-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  .total-energy-input[type=number]{-moz-appearance:textfield;}
  .total-energy-down{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.5);border-left:none;border-radius:0 4px 4px 0;color:var(--gold);font-size:9px;font-weight:700;padding:0 4px;cursor:pointer;line-height:1;display:flex;align-items:center;}
  .total-energy-wrap{display:flex;align-items:stretch;}
  .energy-btns{display:flex;gap:5px;flex:1;}
  .energy-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--text);font-family:inherit;font-size:12px;padding:4px 8px;cursor:pointer;transition:all 0.15s;}
  .energy-btn.plus{color:var(--gold);border-color:rgba(201,168,76,0.3);}
  .energy-btn.plus:hover{background:rgba(201,168,76,0.1);}
  .energy-btn.minus{color:var(--muted);}
  .energy-btn.full{color:var(--green);border-color:rgba(78,207,122,0.3);}
  .energy-btn.reset-e{color:var(--muted);}
  /* TOTAL VIEW */
  /* 7. 계정간 간격 축소 */
  .total-acc-block{margin-bottom:3px;}
  .total-acc-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;padding:4px 0 3px;border-bottom:1px solid var(--gold-dim);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
  .acc-memo-input{background:none;border:none;border-bottom:1px dashed rgba(255,255,255,0.1);outline:none;color:rgba(255,255,255,0.45);font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:400;width:60px;padding:1px 2px;letter-spacing:0;}
  .acc-memo-input:focus{border-bottom-color:var(--gold);color:var(--text);}
  .acc-memo-input::placeholder{color:rgba(255,255,255,0.15);}
  .total-acc-title .acc-total-prog{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0;}
  .icon-char-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:7px;margin-bottom:3px;}
  .total-memo{background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-family:inherit;font-size:10px;width:100%;min-width:0;padding:1px 3px;outline:none;}
  .total-memo:focus{border-bottom-color:var(--gold);color:var(--text);}
  .total-memo::placeholder{color:rgba(255,255,255,0.2);}
  .icon-char-name{font-size:11px;color:var(--blue);font-weight:600;width:60px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .icon-tasks{display:flex;gap:3px;align-items:center;flex:1;}
  .icon-sep{width:1px;height:14px;background:rgba(255,255,255,0.08);margin:0 1px;flex-shrink:0;}
  /* 4. 완료시 붉은색 강조 */
  .icon-task{width:24px;height:24px;border-radius:5px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all 0.15s;position:relative;flex-shrink:0;user-select:none;}
  .icon-task:hover{background:rgba(255,255,255,0.08);}
  .icon-task.done{background:rgba(224,85,85,0.2);border-color:rgba(224,85,85,0.55);}
  .icon-task.done::after{content:'✓';position:absolute;bottom:-2px;right:-1px;font-size:8px;color:var(--red);font-weight:900;line-height:1;}
  .icon-energy{font-size:9px;font-weight:700;color:var(--muted);width:30px;height:24px;border-radius:5px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon-energy.e-mid{color:#4a9edd;border-color:rgba(74,158,221,0.4);background:rgba(74,158,221,0.08);}
  .icon-energy.e-high{color:#c9a84c;border-color:rgba(201,168,76,0.5);background:rgba(201,168,76,0.1);}
  .icon-energy.e-max{color:#4ecf7a;border-color:rgba(78,207,122,0.6);background:rgba(78,207,122,0.12);box-shadow:0 0 6px rgba(78,207,122,0.3);}
  .total-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding:7px 10px;background:rgba(255,255,255,0.02);border-radius:7px;}
  .link-section{margin-top:14px;padding-top:10px;border-top:1px solid var(--gold-dim);}
  .link-section-title{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .link-card{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:6px 10px;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
  .link-name-input{background:none;border:none;outline:none;color:var(--gold);font-family:inherit;font-size:11px;font-weight:700;width:44px;padding:0 2px;flex-shrink:0;}
  .link-del-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;margin-left:auto;}
  .link-del-btn:hover{color:var(--red);}
  .link-selects{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
  .link-select{background:var(--card2);border:1px solid rgba(255,255,255,0.08);border-radius:5px;color:var(--text);font-family:inherit;font-size:10px;padding:2px 4px;outline:none;max-width:90px;}
  .add-link-btn{background:none;border:1px dashed rgba(201,168,76,0.25);border-radius:7px;color:rgba(201,168,76,0.5);font-family:inherit;font-size:11px;padding:5px 12px;cursor:pointer;width:100%;transition:all 0.2s;}
  .add-link-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.5);}
  .total-legend span{font-size:10px;color:var(--muted);}
  .notes-section{background:var(--card);border:1px solid var(--gold-dim);border-radius:10px;padding:14px;margin-top:24px;}
  .todo-section{margin-top:14px;padding-top:10px;border-top:1px solid var(--gold-dim);}
  .todo-section-title{font-size:11px;font-weight:700;letter-spacing:3px;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .todo-row{display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:7px;margin-bottom:4px;}
  .todo-num{font-size:11px;font-weight:700;color:var(--gold);width:14px;text-align:center;flex-shrink:0;}
  .todo-char-sel{background:var(--card2);border:1px solid rgba(255,255,255,0.08);border-radius:5px;color:var(--blue);font-family:inherit;font-size:11px;padding:3px 4px;outline:none;flex-shrink:0;max-width:80px;}
  .todo-text{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:12px;min-width:0;}
  .todo-text::placeholder{color:rgba(255,255,255,0.2);}
  .todo-order-btns{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
  .todo-ord-btn{background:none;border:none;color:var(--muted);font-size:9px;cursor:pointer;padding:0 2px;line-height:1.2;}
  .todo-ord-btn:hover:not([disabled]){color:var(--gold);}
  .todo-ord-btn[disabled]{opacity:0.2;cursor:default;}
  .todo-del-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;}
  .todo-del-btn:hover{color:var(--red);}
  .notes-label{font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;}
  textarea{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:9px 11px;color:var(--text);font-family:inherit;font-size:13px;resize:vertical;min-height:56px;outline:none;transition:border-color 0.2s;}
  textarea:focus{border-color:var(--gold-dim);}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card2);border:1px solid rgba(78,207,122,0.3);color:var(--green);padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;transition:transform 0.25s ease;z-index:999;white-space:nowrap;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999;}
  .loading-icon{font-size:32px;animation:spin 1.5s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--muted);}
</style>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<script>
// 서비스워커 즉시 강제 삭제 (캐시 문제 해결)
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});
  if(window.caches)caches.keys().then(keys=>{keys.forEach(k=>caches.delete(k));});
}
</script>
<div class="loading-screen" id="loading" style="display:none"><div class="loading-icon">⚔️</div><div class="loading-text">데이터 불러오는 중...</div></div>
<div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span class="sync-label" id="sync-label">연결 중...</span></div>
<header class="header">
  <div class="header-inner">
    <a class="logo" href="https://www.aion2tool.com/char/serverid=1016/%EC%A3%BC%EB%84%B9%EC%9D%B4" target="_blank">
      <div class="logo-icon">⚔️</div>
      <div><div class="logo-text">AION II</div><div class="logo-sub">숙제 체크리스트 <span style="font-size:7px;color:rgba(255,255,255,0.2);margin-left:3px;">v70</span></div></div>
    </a>

async function fbGet(){

// 3. 주간 항목을 daily에 통합 (weekly:true 플래그)
const TASKS=[
  {id:'dr1',name:'성역',desc:'주간 퀘스트 — 수요일 05:00 초기화',count:'주간',weekly:true},
  {id:'dr2',name:'어비스 회랑',desc:'화·목·토 21:00 초기화',count:'최대 3회'},
  {id:'dr4',name:'오드에너지',desc:'00시 기준 3시간마다 +15 자동충전',count:'최대 840',type:'energy'},
  {id:'dr5',name:'악몽 던전',desc:'몽환의 파편 획득 — 매일 2회 충전, 최대 14회',count:'2회/일'},
  {id:'wd1',name:'각성전',desc:'주간 3회 · 수요일 05:00 초기화',count:'3회/주',weekly:true},
  {id:'wd4',name:'오드에너지 구매',desc:'주간 · 수요일 05:00 초기화',count:'주간',weekly:true},
];
const DAILY_IDS=TASKS.filter(t=>!t.type&&!t.weekly).map(t=>t.id);
const WEEKLY_IDS=TASKS.filter(t=>t.weekly).map(t=>t.id);
const ALL_IDS=TASKS.filter(t=>!t.type).map(t=>t.id);
// 진행도 카운팅: 각성전만
const COUNT_IDS=['wd1'];
const TOTAL=COUNT_IDS.length;

let data={accounts:[],savedAt:null};
let curAcc=-1,curChar=0,saveTimer=null;

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label');
  dot.className='sync-dot '+s;
  label.textContent=s==='online'?'실시간 동기화 중':s==='syncing'?'저장 중...':'연결 중...';
}

function calcEnergyCharge(stored,lastMs){
  if(!lastMs)return stored;
  const from=new Date(lastMs),to=new Date();
  if(to<=from)return stored;
  // 충전 슬롯: 02,05,08,11,14,17,20,23시 (h%3==2)
  function slotsPassed(f,t){
    let count=0;
    const cur=new Date(f);
    cur.setMinutes(0,0,0);
    const h=cur.getHours();
    // f 이후 첫 슬롯 (h%3==2인 시각)
    let nextH=h+((2-h%3+3)%3||3);
    cur.setHours(nextH>=24?nextH-24:nextH);
    if(nextH>=24)cur.setDate(cur.getDate()+1);
    while(cur<=t){
      count++;
      cur.setHours(cur.getHours()+3);
    }
    return count;
  }
  const slots=slotsPassed(from,to);
  return Math.min(840,stored+slots*15);
}

function save(){
  try{autoReset();}catch(e){}
  data.savedAt=Date.now();
  lsSet('aion2-local',JSON.stringify(data));
  setSyncStatus('syncing');clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await fbSet(data);setSyncStatus('online');}
    catch(e){setSyncStatus('');}
  },1000);
}

function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}

function autoReset(){
  const now=new Date();

  // 악몽던전: 매일 05:00
  const lastDay=new Date(now);
  if(now.getHours()<5)lastDay.setDate(lastDay.getDate()-1);
  lastDay.setHours(5,0,0,0);
  const lastDayTs=lastDay.getTime();
  const savedDayTs=parseInt(lsGet('aion2-day-ts')||'0');
  if(savedDayTs < lastDayTs || (data.savedAt||0) < lastDayTs){
    data.accounts.forEach(acc=>acc.chars.forEach(ch=>['dr5'].forEach(id=>{ch.state[id]=false;})));
    lsSet('aion2-day-ts', String(lastDayTs));
  }

  // 어비스 회랑: 화목토 21:00
  function lastAbyss(n){for(let b=0;b<=7;b++){const d=new Date(n);d.setDate(d.getDate()-b);d.setHours(21,0,0,0);if([2,4,6].includes(d.getDay())&&d<=n)return d;}
  }
  const la=lastAbyss(now)||new Date(0);
  const laTs=la.getTime();
  const savedAkTs=parseInt(lsGet('aion2-abyss-ts')||'0');
  if(savedAkTs < laTs || (data.savedAt||0) < laTs){
    data.accounts.forEach(acc=>acc.chars.forEach(ch=>{ch.state['dr2']=false;}));
    lsSet('aion2-abyss-ts', String(laTs));
  }

  // 주간(성역·각성전·오드구매): 수요일 05:00
  function getLastWedAt5(n){
    const d=new Date(n);
    let daysBack=(d.getDay()-3+7)%7;
    if(daysBack===0&&d.getHours()<5)daysBack=7;
    d.setDate(d.getDate()-daysBack);
    d.setHours(5,0,0,0);
    return d.getTime();
  }
  const lastWedTs=getLastWedAt5(now);
  const savedWkTs=parseInt(lsGet('aion2-week-ts')||'0');
  // data.savedAt이 리셋 기준 시각보다 이전이면 → 데이터가 오래된 것 → 무조건 리셋
  const dataPredatesReset=(data.savedAt||0) < lastWedTs;
  if(savedWkTs < lastWedTs || dataPredatesReset){
    data.accounts.forEach(acc=>acc.chars.forEach(ch=>WEEKLY_IDS.forEach(id=>{ch.state[id]=false;})));
    lsSet('aion2-week-ts', String(lastWedTs));
  }
}

function getLastChargeSlot(){
  // 현재 시각 기준 가장 최근 충전 슬롯 시각 반환
  const now=new Date();
  const h=now.getHours();
  const lastH=h-((h-2+24)%3);
  const last=new Date(now);
  last.setHours(lastH<0?lastH+24:lastH,0,0,0);
  if(last>now)last.setDate(last.getDate()-1);
  return last.getTime();
}
function applyEnergy(d){
  // 앱 시작 시 or 타이머에서만 호출 (Firebase 받을 때 X)
  const savedSlotMs=parseInt(lsGet('aion2-last-charge-slot')||'0');
  const fromMs=savedSlotMs||d.savedAt||null;
  if(!fromMs)return;
  d.accounts.forEach(acc=>acc.chars.forEach(ch=>{
    if(!ch.state)ch.state={};
    if(ch.state['__energy']===undefined)ch.state['__energy']=0;
    ch.state['__energy']=calcEnergyCharge(ch.state['__energy'],fromMs);
  }));
  // 충전 후 마지막 슬롯 시각 갱신
  lsSet('aion2-last-charge-slot',String(getLastChargeSlot()));
}

// Firebase 수동 수정 에너지 반영: 각 캐릭터 에너지를 Firebase값으로 교체 + lastChargeSlot 재설정
function applyFirebaseEnergy(remote){
  if(!remote||!remote.accounts)return;
  try{
    remote.accounts.forEach((acc,ai)=>{
      acc.chars.forEach((ch,ci)=>{
        const remoteE=ch.state?.['__energy'];
        if(remoteE!==undefined && data.accounts[ai]?.chars[ci]?.state){
          data.accounts[ai].chars[ci].state['__energy']=remoteE;
        }
      });
    });
    // lastChargeSlot을 Firebase.savedAt 기준 슬롯으로 재설정
    // → 다음 타이머가 Firebase 저장 이후부터 충전 계산
    if(remote.savedAt){
      const remoteSlot=getLastChargeSlotAt(new Date(remote.savedAt));
      const localSlot=parseInt(lsGet('aion2-last-charge-slot')||'0');
      // 더 최신 슬롯으로 설정 (이미 로컬에서 더 많이 충전됐을 수도 있으므로)
      if(remoteSlot>localSlot){
        lsSet('aion2-last-charge-slot',String(remoteSlot));
      }
    }
  }catch(e){}
}
function getLastChargeSlotAt(dateObj){
  const h=dateObj.getHours();
  const lastH=h-((h-2+24)%3);
  const last=new Date(dateObj);
  last.setHours(lastH<0?lastH+24:lastH,0,0,0);
  if(last>dateObj)last.setDate(last.getDate()-1);
  return last.getTime();
}
function ensureDefaults(d){
  if(!d.accounts||!d.accounts.length)d.accounts=Array.from({length:5},(_,i)=>({name:'계정'+(i+1),chars:[{name:'캐릭터1',state:{'__energy':0},notes:''}]}));
  if(!d.memos||!d.memos.length)d.memos=[{title:'각성전',content:''}];
  if(!d.links)d.links=[];
  if(!d.todos)d.todos=[];
}
function getChar(){return data.accounts[curAcc].chars[curChar];}
function getProgress(ch){return COUNT_IDS.filter(id=>ch.state&&ch.state[id]).length;}
function cpColor(cp){
  if(!cp||cp<22)return '#6a7a90';   // 회색
  if(cp<25)return '#aab8c2';         // 실버
  if(cp<28)return '#4a9edd';         // 블루
  if(cp<30)return '#d4b86a';         // 골드(연)
  if(cp<35)return '#a06af0';         // 퍼플
  return '#e07855';                   // 오렌지
}
function cpLabel(cp){
  if(!cp||cp<1)return '';
  return `<span style="font-size:10px;font-weight:700;color:${cpColor(cp)};margin-left:4px;">${cp}</span>`;
}

function renderAccTabs(){
  const el=document.getElementById('acc-tabs');el.innerHTML='';

function renderLinkSection(){
  if(!data.links)data.links=[];
  let html=`<div class="link-section">
    <div class="link-section-title">
      <span>🔗 링크 시스템</span>
      <span style="font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0;">파티 조합 메모</span>
    </div>`;
  if(data.links.length===0){
    html+=`<div style="font-size:11px;color:var(--muted);padding:8px 4px 10px;font-style:italic;">링크가 없습니다. 아래 버튼으로 추가하세요.</div>`;
  }
  data.links.forEach((link,li)=>{
    // 계정별 select
    const selects=data.accounts.map((acc,ai)=>{
      const cur=link.chars&&link.chars[ai]!==undefined?link.chars[ai]:undefined;
      const opts=`<option value="">— ${acc.name}</option>`+acc.chars.map((ch,ci)=>`<option value="${ci}"${cur===ci?'selected':''}>${ch.name}${ch.cp?' '+ch.cp:''}</option>`).join('');
      return `<select class="link-select" onchange="window._linkSet(${li},${ai},this.value)">${opts}</select>`;
    }).join('');
    html+=`<div class="link-card">
      <input class="link-name-input" type="text" maxlength="8" value="${(link.name||'링크'+(li+1)).replace(/"/g,'&quot;')}" placeholder="링크명" oninput="window._linkRename(${li},this.value)">
      <div class="link-selects">${selects}</div>
      <button class="link-del-btn" onclick="window._linkDel(${li})">×</button>
    </div>`;
  });
  html+=`<button class="add-link-btn" onclick="window._linkAdd()">+ 링크 추가</button></div>`;
  return html;
}

window._linkAdd=()=>{
  if(!data.links)data.links=[];
  data.links.push({name:'링크'+(data.links.length+1),chars:{}});
  save();if(curAcc===-1)renderTotalView();
};
window._linkDel=(li)=>{
  data.links.splice(li,1);
  save();if(curAcc===-1)renderTotalView();
};
window._linkSet=(li,ai,val)=>{
  if(!data.links[li].chars)data.links[li].chars={};
  if(val==='')delete data.links[li].chars[ai];
  else data.links[li].chars[ai]=parseInt(val);
  save();if(curAcc===-1)renderTotalView();
};
window._linkRename=(li,val)=>{
  data.links[li].name=val||('링크'+(li+1));
  save();
};

      <input class="todo-text" type="text" maxlength="30" placeholder="할 일 입력..." value="${(todo.text||'').replace(/"/g,'&quot;')}" data-i="${i}"
        oninput="window._todoText(${i},this.value)"
        onkeydown="if(event.key==='Enter')this.blur()">
      <div class="todo-order-btns">
        <button class="todo-ord-btn" onclick="window._todoMove(${i},-1)" ${i===0?'disabled':''}>▲</button>

      </div>

    </div>`;
  });

  return `<div class="todo-section">
    <div class="todo-section-title">
      <span>📋 우선순위 할 일</span>
      <button class="add-link-btn" style="width:auto;padding:4px 12px;font-size:11px;" onclick="window._todoAdd()">+ 추가</button>
    </div>

  </div>`;
}

window._todoAdd=()=>{
  ensureTodos();
  data.todos.push({char:'',text:''});
  save();renderTotalView();
  // 새로 추가된 input에 포커스
  setTimeout(()=>{
    const inputs=document.querySelectorAll('.todo-text');
    if(inputs.length)inputs[inputs.length-1].focus();
  },50);
};
window._todoDel=(i)=>{
  ensureTodos();data.todos.splice(i,1);save();renderTotalView();
};
window._todoText=(i,v)=>{
  ensureTodos();data.todos[i].text=v;save();
};
window._todoChar=(i,v)=>{
  ensureTodos();data.todos[i].char=v;save();renderTotalView();
};
window._todoMove=(i,dir)=>{
  ensureTodos();
  const j=i+dir;
  if(j<0||j>=data.todos.length)return;

};

        <button onclick="window._allEnergy(15)" style="background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);border-radius:5px;color:var(--gold);font-size:10px;font-weight:700;padding:2px 7px;cursor:pointer;">+15</button>

    html+=`<div class="total-acc-block"><div class="total-acc-title"><span>${acc.name}</span><input class="acc-memo-input" type="text" maxlength="8" placeholder="메모" value="${(acc.memo||'').replace(/"/g,'&quot;')}" data-ai="${ai}" onclick="event.stopPropagation()"><span class="acc-total-prog" style="margin-left:auto;margin-right:${ai===0?'4px':'0'}">${ad}/${am}</span>${allEnergyBtns}</div>`;
    acc.chars.forEach((ch,ci)=>{

      const icons={dr1:'😈',dr2:'🌀',dr5:'💀',wd1:'⚔️',wd4:'🛒'};
      const taskHtml=TASKS.map(t=>{
        if(t.type==='energy'){const ecls=energy>=840?'e-max':energy>=700?'e-high':energy>=600?'e-mid':'';return `<div class="icon-energy ${ecls}" data-ai="${ai}" data-ci="${ci}" title="클릭해서 수정" onclick="window._editEnergy(${ai},${ci},this)">${energy>=840?'MAX':energy}</div>`;}
        const done=!!(ch.state&&ch.state[t.id]);
        return `<div class="icon-task${done?' done':''}" title="${t.name}" onclick="window._tt(${ai},${ci},'${t.id}')">${icons[t.id]||'•'}</div>`;

      // 이 캐릭터가 속한 링크 찾기 (첫번째 링크 기준으로 색상)

      const LINK_BORDER=['rgba(224,85,85,0.35)','rgba(74,158,221,0.35)','rgba(78,207,122,0.35)','rgba(160,106,240,0.35)','rgba(224,120,85,0.35)','rgba(85,200,224,0.35)','rgba(201,168,76,0.35)'];
      const linkIdx=(data.links||[]).findIndex(lk=>lk.chars&&lk.chars[ai]===ci);
      const rowBg=linkIdx>=0?`background:${LINK_COLORS[linkIdx%LINK_COLORS.length]};border-color:${LINK_BORDER[linkIdx%LINK_BORDER.length]};`:'';
      html+=`<div class="icon-char-row" style="${rowBg}"><div class="icon-char-name" style="width:70px;flex-shrink:0;display:flex;align-items:center;gap:0;">${cpTag}<span style="color:${nameColor};font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${ch.cp?'48px':'60px'};">${ch.name}</span></div><div class="icon-tasks">${taskHtml}</div><input class="total-memo" type="text" maxlength="20" placeholder="메모" value="${(ch.totalMemo||'').replace(/"/g,'&quot;')}" data-ai="${ai}" data-ci="${ci}" onclick="event.stopPropagation()"></div>`;
    });
    html+=`</div>`;
  });
  html+=renderLinkSection();
  html+=renderTodoSection();
  main.innerHTML=html;
  // 메모 입력 이벤트
  main.querySelectorAll('.total-memo').forEach(el=>{
    el.addEventListener('change',e=>{
      const ai=parseInt(e.target.dataset.ai),ci=parseInt(e.target.dataset.ci);
      data.accounts[ai].chars[ci].totalMemo=e.target.value;
      save();
    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter')e.target.blur();});
  });
  main.querySelectorAll('.acc-memo-input').forEach(el=>{
    el.addEventListener('input',e=>{
      const ai=parseInt(e.target.dataset.ai);
      data.accounts[ai].memo=e.target.value;

    });
    el.addEventListener('keydown',e=>{if(e.key==='Enter')e.target.blur();});
  });

function renderTaskListForChar(ci){

    }

      div.innerHTML=`<div class="energy-bar-wrap">
        <div class="energy-label-row">
          <div><div class="energy-name">⚡ ${task.name}</div><div class="energy-desc">${task.desc}</div></div>
          <input class="energy-direct" type="number" min="0" max="840" value="${e}" placeholder="0~840"
            onchange="window._seIdx(${ci},Math.max(0,Math.min(840,parseInt(this.value)||0)))"
            onclick="this.select()">
          <div class="energy-val" style="cursor:default;">/ 840</div>
        </div>
        <input class="energy-slider" type="range" min="0" max="840" step="10" value="${e}" onchange="window._seIdx(${ci},parseInt(this.value))" oninput="(()=>{const ch=data.accounts[curAcc].chars[${ci}];const e=(ch.state&&ch.state['__energy'])||0;document.querySelector('#list-char-${ci} .energy-direct').value=parseInt(this.value);document.querySelector('#list-char-${ci} .energy-fill').style.width=Math.round(parseInt(this.value)/840*100)+'%';})()">
        <div class="energy-btns" style="margin-top:4px;">

          <button class="energy-btn plus" onclick="window._aeIdx(${ci},120)">+120</button>
          <button class="energy-btn full" onclick="window._seIdx(${ci},840)">MAX</button>
          <button class="energy-btn reset-e" onclick="window._seIdx(${ci},0)">초기화</button>
          <button class="energy-btn" onclick="window._undoEnergy(${ci})" style="color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.15);">↩</button>
        </div></div>`;
    } else {
      const done=!!(ch.state&&ch.state[task.id]);

function render(){renderAccTabs();renderCharTabs();if(curAcc===-1)renderTotalView();else renderCharView();}

function toggleIdx(ci,id){
  const ch=data.accounts[curAcc].chars[ci];if(!ch.state)ch.state={};
  ch.state[id]=!ch.state[id];save();
  renderTaskListForChar(ci);renderCharTabs();renderAccTabs();
  if(ch.state[id])showToast('✓ 완료!');
}
function toggle(id){toggleIdx(curChar,id);}
window._raIdx=(ci)=>{const ch=data.accounts[curAcc].chars[ci];ALL_IDS.forEach(id=>{ch.state[id]=false;});save();renderTaskListForChar(ci);renderCharTabs();renderAccTabs();showToast('초기화 완료');};
window._ra=()=>window._raIdx(curChar);
window._rg=()=>window._raIdx(curChar);
// 에너지 undo 히스토리 스택 (계정별 캐릭터별 최대 5단계)
const energyStacks={};
// Firebase에서 마지막으로 받은 에너지 캐시 (덮어쓰기 충돌 방지용)

function pushEnergyHistory(accIdx,ci,val){
  const key=accIdx+'-'+ci;
  if(!energyStacks[key])energyStacks[key]=[];
  energyStacks[key].push(val);
  if(energyStacks[key].length>5)energyStacks[key].shift();
}
window._aeIdx=(ci,d)=>{
  const ch=data.accounts[curAcc].chars[ci];if(!ch.state)ch.state={};
  pushEnergyHistory(curAcc,ci,ch.state['__energy']||0);
  ch.state['__energy']=Math.max(0,Math.min(840,(ch.state['__energy']||0)+d));
  save();renderTaskListForChar(ci);
};
window._seIdx=(ci,v)=>{
  const ch=data.accounts[curAcc].chars[ci];if(!ch.state)ch.state={};
  pushEnergyHistory(curAcc,ci,ch.state['__energy']||0);
  ch.state['__energy']=Math.max(0,Math.min(840,v||0));
  save();renderTaskListForChar(ci);
};
// 토탈탭에서 에너지 변경 시 히스토리 저장
function pushEnergyHistoryTotal(ai,ci,val){
  const key=ai+'-'+ci;
  if(!energyStacks[key])energyStacks[key]=[];
  energyStacks[key].push(val);
  if(energyStacks[key].length>5)energyStacks[key].shift();
}
window._undoEnergy=(ai,ci,isTotal)=>{
  const accIdx=isTotal?ai:curAcc;
  const ch=data.accounts[accIdx].chars[ci];if(!ch.state)ch.state={};
  const key=accIdx+'-'+ci;
  const stack=energyStacks[key];
  if(!stack||!stack.length){showToast('되돌릴 기록 없음');return;}
  ch.state['__energy']=stack.pop();
  save();
  if(isTotal){
    // 토탈탭: 해당 셀만 업데이트
    const v=ch.state['__energy'];
    const ecls=v>=840?'e-max':v>=700?'e-high':v>=600?'e-mid':'';
    const el=document.querySelector(`.icon-energy[data-ai="${accIdx}"][data-ci="${ci}"]`);
    if(el){el.className='icon-energy'+(ecls?' '+ecls:'');el.textContent=v>=840?'MAX':v;}
    renderAccTabs();
  } else {
    renderTaskListForChar(ci);
  }
  showToast('↩ 되돌림 ('+(stack.length)+'단계 남음)');
};
window._ae=(d)=>window._aeIdx(curChar,d);
window._se=(v)=>window._seIdx(curChar,v);
window._delChar=(ci)=>{const acc=data.accounts[curAcc];if(acc.chars.length<=1)return;acc.chars.splice(ci,1);save();render();showToast('캐릭터 삭제됨');};
window._del=()=>window._delChar(curChar);
window._allEnergy=(delta)=>{
  const now=Date.now();
  data.accounts.forEach(acc=>acc.chars.forEach(ch=>{
    if(!ch.state)ch.state={};
    const v=Math.max(0,Math.min(840,(ch.state['__energy']||0)+delta));
    ch.state['__energy']=v;
    }));
  save();renderTotalView();showToast((delta>0?'+':'')+delta+' 전체 에너지');
};
window._tt=(ai,ci,id)=>{const ch=data.accounts[ai].chars[ci];if(!ch.state)ch.state={};ch.state[id]=!ch.state[id];save();renderTotalView();renderAccTabs();if(ch.state[id])showToast('✓ 완료!');};
window._editEnergy=(ai,ci,el)=>{
  const ch=data.accounts[ai].chars[ci];if(!ch.state)ch.state={};
  const cur=(ch.state['__energy']||0);
  const wrap=document.createElement('div');wrap.className='total-energy-wrap';
  const input=document.createElement('input');
  input.type='number';input.min=0;input.max=840;input.value=cur;
  input.className='total-energy-input';
  const down=document.createElement('button');
  down.className='total-energy-down';down.textContent='▼';

  // 저장 후 해당 셀만 원래 에너지 div로 복원 (renderTotalView 안 씀)
  function restoreCell(v){
    const ecls=v>=840?'e-max':v>=700?'e-high':v>=600?'e-mid':'';
    const newEl=document.createElement('div');
    newEl.className='icon-energy'+(ecls?' '+ecls:'');
    newEl.dataset.ai=ai;newEl.dataset.ci=ci;
    newEl.title='클릭해서 수정';
    newEl.textContent=v>=840?'MAX':v;
    newEl.onclick=()=>window._editEnergy(ai,ci,newEl);
    wrap.replaceWith(newEl);
    renderAccTabs();
  }

  let confirmed=false;
  function confirm(){
    if(confirmed)return;confirmed=true;
    const v=Math.max(0,Math.min(840,parseInt(input.value)||0));
    pushEnergyHistoryTotal(ai,ci,cur);
    ch.state['__energy']=v;
      save();restoreCell(v);
  }

  down.addEventListener('mousedown',e=>e.preventDefault());
  down.addEventListener('click',e=>{
    e.stopPropagation();
    pushEnergyHistoryTotal(ai,ci,ch.state['__energy']||0);
    const v=Math.max(0,Math.min(840,(parseInt(input.value)||0)-80));
    input.value=v;ch.state['__energy']=v;save();
    const ecls=v>=840?'e-max':v>=700?'e-high':v>=600?'e-mid':'';
    wrap.dataset.ecls=ecls;
  });

  const undo=document.createElement('button');
  undo.textContent='↩';
  undo.style.cssText='background:none;border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:rgba(255,255,255,0.4);font-size:9px;padding:0 4px;cursor:pointer;flex-shrink:0;';
  undo.addEventListener('mousedown',e=>e.preventDefault());
  undo.addEventListener('click',e=>{
    e.stopPropagation();
    const key=ai+'-'+ci;
    const stack=energyStacks[key];
    if(!stack||!stack.length){showToast('되돌릴 기록 없음');return;}
    const prev=stack.pop();
    input.value=prev;ch.state['__energy']=prev;save();
    showToast('↩ 되돌림'+(stack.length?` (${stack.length}단계 남음)`:''));
  });
  wrap.appendChild(input);wrap.appendChild(down);wrap.appendChild(undo);
  el.replaceWith(wrap);
  input.focus();input.select();

  input.addEventListener('blur',confirm);
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){input.blur();}
    if(e.key==='Escape'){confirmed=true;restoreCell(cur);}
  });
};
function addChar(){const acc=data.accounts[curAcc];acc.chars.push({name:'캐릭터'+(acc.chars.length+1),state:{},notes:''});save();render();showToast('캐릭터 추가됨');}
window._addAcc=()=>{
  const i=data.accounts.length+1;
  data.accounts.push({name:'계정'+i,chars:[{name:'캐릭터1',state:{'__energy':0},notes:''}]});
  curAcc=data.accounts.length-1;curChar=0;
  save();render();showToast('계정 추가됨');
};
window._delAcc=(i)=>{
  if(data.accounts.length<=1){showToast('최소 1개는 필요해요');return;}
  if(!confirm(data.accounts[i].name+' 계정을 삭제할까요?\n(모든 캐릭터 데이터가 삭제됩니다)'))return;
  data.accounts.splice(i,1);
  if(curAcc>=data.accounts.length)curAcc=data.accounts.length-1;
  save();render();showToast('계정 삭제됨');
};
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600);}

// Firebase + 타임아웃 (5초 안에 안되면 로컬로 fallback)
function loadLocal(){

try{const s=lsGet('aion2-local');if(s){const local=JSON.parse(s);localSavedAt=local.savedAt||0;applyEnergy(local);ensureDefaults(local);data=local;}else ensureDefaults(data);}catch(e){ensureDefaults(data);}
  autoReset();render();document.getElementById('loading').style.display='none';setSyncStatus('');
}
function saveLocal(){data.savedAt=Date.now();lsSet('aion2-local',JSON.stringify(data));}

// ---- 공략집 메모장 ----
let memos=[];
let curMemo=0;
let isMemoMode=false;

function loadMemos(){
  // data.memos 에서 불러옴 (Firebase 동기화 대상)
  if(data.memos&&data.memos.length){
    memos=data.memos;
  } else {
    memos=[{title:'각성전',content:''}];
    data.memos=memos;
  }
}
function saveMemos(){
  // data.memos 에 저장 후 save() 호출 → Firebase까지 동기화
  data.memos=memos;
  save();
}
function toggleMemo(){
  isMemoMode=!isMemoMode;
  const btn=document.getElementById('memo-toggle-btn');
  const mainEl=document.getElementById('main-content');
  const memoEl=document.getElementById('memo-screen');
  const accBar=document.querySelector('.acc-tab-bar');
  const charBar=document.querySelector('.char-tab-bar');
  if(isMemoMode){
    mainEl.style.display='none';
    accBar.style.display='none';
    charBar.style.display='none';
    memoEl.style.display='flex';
    btn.style.borderColor='rgba(201,168,76,0.5)';
    btn.querySelector('span:last-child').style.color='var(--gold)';
    renderMemoTabs();
  } else {
    mainEl.style.display='';
    accBar.style.display='';
    charBar.style.display=curAcc===-1?'none':'';
    memoEl.style.display='none';
    btn.style.borderColor='rgba(255,255,255,0.1)';
    btn.querySelector('span:last-child').style.color='var(--muted)';
  }
}
function renderMemoTabs(){
  const el=document.getElementById('memo-tabs');el.innerHTML='';
  memos.forEach((m,i)=>{
    const btn=document.createElement('button');
    btn.textContent=m.title;
    btn.style.cssText=`flex-shrink:0;padding:5px 12px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s;white-space:nowrap;
      background:${i===curMemo?'rgba(201,168,76,0.12)':'rgba(255,255,255,0.03)'};
      border:1px solid ${i===curMemo?'rgba(201,168,76,0.4)':'rgba(255,255,255,0.07)'};
      color:${i===curMemo?'var(--gold)':'var(--muted)'};`;
    btn.onclick=()=>{saveCurMemo();curMemo=i;renderMemoTabs();loadCurMemo();};
    el.appendChild(btn);
  });
  loadCurMemo();
}
function loadCurMemo(){
  const m=memos[curMemo];
  document.getElementById('memo-title-input').value=m.title;
  const el=document.getElementById('memo-content');
  el.innerHTML=m.content||'';
}
function saveCurMemo(){
  memos[curMemo].title=document.getElementById('memo-title-input').value||('메모'+(curMemo+1));
  memos[curMemo].content=document.getElementById('memo-content').innerHTML;
  saveMemos();
}
// 서식 함수
function memoCmd(cmd){
  document.getElementById('memo-content').focus();
  document.execCommand(cmd,false,null);
  saveCurMemo();
}
function memoColor(color){
  document.getElementById('memo-content').focus();
  document.execCommand('foreColor',false,color);
  saveCurMemo();
}
function memoSize(px){
  document.getElementById('memo-content').focus();
  // fontSize 7 trick: execCommand 후 font[size=7] 찾아서 style로 교체
  document.execCommand('fontSize',false,'7');
  const editor=document.getElementById('memo-content');
  editor.querySelectorAll('font[size="7"]').forEach(el=>{
    el.removeAttribute('size');
    el.style.fontSize=px;
  });
  saveCurMemo();
}
function addMemoTab(){
  saveCurMemo();
  memos.push({title:'메모'+(memos.length+1),content:''});
  curMemo=memos.length-1;
  saveMemos();renderMemoTabs();showToast('탭 추가됨');
}
function deleteMemoTab(){
  if(memos.length<=1){showToast('최소 1개는 필요해요');return;}
  memos.splice(curMemo,1);
  curMemo=Math.max(0,curMemo-1);
  saveMemos();renderMemoTabs();showToast('탭 삭제됨');
}
document.getElementById('memo-title-input').addEventListener('input',()=>{saveCurMemo();renderMemoTabs();});
document.getElementById('memo-content').addEventListener('input',()=>{saveCurMemo();});

// ---- 이미지 팝업 툴바 ----
(function(){
  const popup=document.createElement('div');
  popup.id='img-popup';
  popup.style.cssText='display:none;position:fixed;z-index:9999;background:#141d2e;border:1px solid rgba(201,168,76,0.4);border-radius:9px;padding:5px 7px;display:none;align-items:center;gap:4px;box-shadow:0 4px 16px rgba(0,0,0,0.5);';
  popup.innerHTML=
    '<button class="fmt-btn" data-w="25%">25%</button>'+
    '<button class="fmt-btn" data-w="50%">50%</button>'+
    '<button class="fmt-btn" data-w="75%">75%</button>'+
    '<button class="fmt-btn" data-w="100%">100%</button>'+
    '<div class="memo-sep"></div>'+
    '<button class="fmt-btn" id="img-del-btn" style="color:#e05555;">🗑</button>';
  document.body.appendChild(popup);

  let curImg=null;

  function showPopup(img,e){
    curImg=img;
    popup.style.display='flex';
    const x=Math.min(e.clientX, window.innerWidth-180);
    const y=e.clientY+10;
    popup.style.left=x+'px';
    popup.style.top=y+'px';
  }
  function hidePopup(){popup.style.display='none';curImg=null;}

  popup.querySelectorAll('[data-w]').forEach(btn=>{
    btn.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();});
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      if(curImg){curImg.style.width=btn.dataset.w;curImg.style.maxWidth='100%';saveCurMemoWithImg();}
      hidePopup();
    });
  });
  document.getElementById('img-del-btn').addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();});
  document.getElementById('img-del-btn').addEventListener('click',e=>{
    e.stopPropagation();
    if(curImg&&confirm('이미지를 삭제할까요?')){curImg.remove();saveCurMemoWithImg();}
    hidePopup();
  });
  document.addEventListener('click',e=>{
    if(!popup.contains(e.target)&&e.target!==curImg)hidePopup();
  });

  window._attachImgEvents=function(img){
    img.style.cssText='max-width:100%;border-radius:6px;margin:4px 0;display:inline-block;cursor:pointer;'+(img.style.width?'width:'+img.style.width+';':'');
    img.onclick=e=>{e.stopPropagation();showPopup(img,e);};
  };
})();

// 이미지 붙여넣기
document.getElementById('memo-content').addEventListener('paste',e=>{
  const items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(let i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')){
      e.preventDefault();
      const file=items[i].getAsFile();
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=document.createElement('img');
        img.src=ev.target.result;
        window._attachImgEvents(img);
        const sel=window.getSelection();
        if(sel&&sel.rangeCount){
          const range=sel.getRangeAt(0);
          range.deleteContents();
          range.insertNode(img);
          range.setStartAfter(img);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        } else {
          document.getElementById('memo-content').appendChild(img);
        }
        saveCurMemoWithImg();
      };
      reader.readAsDataURL(file);
      return;
    }
  }
});

// 이미지 포함 버전은 로컬스토리지에만, Firebase엔 이미지 제거 후 저장
function saveCurMemoWithImg(){
  const title=document.getElementById('memo-title-input').value||('메모'+(curMemo+1));
  const htmlFull=document.getElementById('memo-content').innerHTML;
  lsSet('aion2-memo-img-'+curMemo, htmlFull);
  memos[curMemo].title=title;
  const tmp=document.createElement('div');
  tmp.innerHTML=htmlFull;
  tmp.querySelectorAll('img').forEach(el=>el.replaceWith('[이미지]'));
  memos[curMemo].content=tmp.innerHTML;
  saveMemos();
}

// 탭 로드 시 로컬 이미지 복원 + 이벤트 재연결
const _origLoad=loadCurMemo;
loadCurMemo=function(){
  _origLoad();
  const saved=lsGet('aion2-memo-img-'+curMemo);
  if(saved){
    document.getElementById('memo-content').innerHTML=saved;
    document.getElementById('memo-content').querySelectorAll('img').forEach(img=>{
      window._attachImgEvents(img);
    });
  }
};

// 서비스워커 + 캐시 완전 삭제
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}

let localSavedAt=0;
try{
  const s=lsGet('aion2-local');
  if(s){
    const local=JSON.parse(s);
    localSavedAt=local.savedAt||0;  // Firebase 비교용 원본 savedAt
    applyEnergy(local);              // 에너지 충전 계산 (savedAt 안 건드림)
    local.savedAt=Date.now();        // 충전 후 savedAt 갱신 → 중복충전 방지
    ensureDefaults(local);
    data=local;
  } else {
    ensureDefaults(data);
  }
}catch(e){ensureDefaults(data);}
try{autoReset();}catch(e){}
lsSet('aion2-local',JSON.stringify(data));
loadMemos();
render();
document.getElementById('loading').style.display='none';





// Firebase 데이터 적용 공통 함수
function applyRemoteData(r){
  if(!r)return;
  data=r;ensureDefaults(data);autoReset();
  // data=r 으로 Firebase 에너지가 이미 data에 들어있음
  // lastChargeSlot을 Firebase.savedAt 기준 슬롯으로 강제 설정
  // → applyEnergy가 Firebase 저장 이후~지금까지 슬롯만 충전
  if(r.savedAt){
    lsSet('aion2-last-charge-slot',String(getLastChargeSlotAt(new Date(r.savedAt))));
  }
  applyEnergy(data);
  memos=data.memos;
  lsSet('aion2-local',JSON.stringify(data));
  render();
  if(isMemoMode)renderMemoTabs();
}

// Firebase SDK 실시간 리스너
fbRef.once('value', snap=>{
  const val=snap.val();
  if(val&&val.savedAt&&val.savedAt>localSavedAt){
    applyRemoteData(val,true);
  }
  setSyncStatus('online');
  // 실시간 리스너 등록 (다른 기기 변경 즉시 반영)
  fbRef.on('value', snap=>{
    const r=snap.val();
    if(r&&r.savedAt&&r.savedAt>data.savedAt+2000){
      applyRemoteData(r,false);
      showToast('🔄 다른 기기에서 업데이트됨');
    }
    setSyncStatus('online');
  });
}).catch(()=>{
  setSyncStatus('');
  fbRef.on('value', snap=>{
    const r=snap.val();
    if(r&&r.savedAt&&r.savedAt>data.savedAt+2000){
      applyRemoteData(r,false);
      showToast('🔄 다른 기기에서 업데이트됨');
    }
    setSyncStatus('online');
  });
});

// 충전 시각(0,3,6,9,12,15,18,21시) 정각에만 에너지 업데이트
function getLastChargeTime(){
  const now=new Date();
  const h=now.getHours();
  // 가장 최근 충전 시각 (h%3==2인 시각)
  let lastH=h-((h-2+24)%3);
  if(lastH<0)lastH+=24;
  const last=new Date(now);
  last.setHours(lastH,0,0,0);
  if(last>now)last.setDate(last.getDate()-1);
  return last;
}
function updateLastChargeLabel(){
  const last=getLastChargeTime();
  const hh=String(last.getHours()).padStart(2,'0');
  const mm=String(last.getMinutes()).padStart(2,'0');
  const el=document.getElementById('charge-time-label');
  if(el)el.textContent=`최근 충전 ${hh}:${mm}`;
}
function doEnergyCharge(){
  // 자동충전은 로컬만 - Firebase 저장 안 함 (기기별 독립 계산)
  try{
    applyEnergy(data);
    try{autoReset();}catch(e){}
    lsSet('aion2-local',JSON.stringify(data));
    updateLastChargeLabel();
    if(curAcc===-1){
      document.querySelectorAll('.icon-energy').forEach(el=>{
        const ai=parseInt(el.dataset.ai),ci=parseInt(el.dataset.ci);
        if(isNaN(ai)||isNaN(ci))return;
        const e=(data.accounts[ai]?.chars[ci]?.state?.['__energy'])||0;
        const ecls=e>=840?'e-max':e>=700?'e-high':e>=600?'e-mid':'';
        el.className='icon-energy'+(ecls?' '+ecls:'');
        el.textContent=e>=840?'MAX':e;
      });
    } else {
      render();
    }
  }catch(e){console.error('doEnergyCharge error:',e);}
}
function scheduleEnergyUpdate(){
  const now=new Date();
  const h=now.getHours();
  let nextH=h+((2-h%3+3)%3||3);
  const next=new Date(now);
  next.setHours(nextH>=24?nextH-24:nextH,0,10,0);
  if(nextH>=24)next.setDate(next.getDate()+1);
  const ms=next-now;
  setTimeout(()=>{
    doEnergyCharge();
    scheduleEnergyUpdate(); // 에러 여부와 무관하게 반드시 재호출
  },ms);
}
// 백업: 1분마다 lastChargeSlot 체크해서 놓친 충전 보정
setInterval(()=>{
  const slot=parseInt(lsGet('aion2-last-charge-slot')||'0');
  const currentSlot=getLastChargeSlot();
  if(currentSlot>slot){
    // 타이머가 놓친 슬롯이 있으면 지금 충전
    doEnergyCharge();
  }
},60000);
scheduleEnergyUpdate();

document.getElementById('today-date').textContent=new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
updateLastChargeLabel();
